<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> NOW THEN FOREVER❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff4d6d; }
        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: #050510; color: white; text-align: center;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* شاشة الدخول */
        #login {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
        input {
            width: 80%; max-width: 250px; padding: 15px;
            border: 2px solid var(--primary); border-radius: 50px;
            background: rgba(255,255,255,0.05); color: white;
            font-size: 18px; margin-bottom: 15px; outline: none; text-align: center;
        }

        #content { display: none; }

        .section {
            min-height: 100vh; width: 100%; display: flex;
            flex-direction: column; justify-content: flex-start;
            align-items: center; padding: 60px 20px; box-sizing: border-box;
        }

        /* تنسيق الصور */
        .img-container {
            width: 100%; max-width: 380px; 
            opacity: 0; transform: translateY(30px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .img-container img {
            width: 100%; height: auto; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); display: block;
        }

        /* إصلاح حجم الصور الجانبية */
        .side-images {
            display: flex; gap: 12px; width: 100%; justify-content: center;
        }
        .side-images .img-wrapper {
            flex: 1; max-width: 180px;
        }
        .side-images img {
            width: 100%; height: 250px; object-fit: cover; border-radius: 15px;
        }

        /* قسم الصور الثلاثي */
        .triple-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .triple-grid img:first-child { grid-column: span 2; height: 300px; }
        .triple-grid img { height: 180px; width: 100%; object-fit: cover; }

        .section.visible .img-container { opacity: 1; transform: translateY(0); }

        /* النصوص */
        .caption {
            font-family: 'Amiri', serif; font-size: 24px;
            color: #ffb3c1; margin-top: 25px; padding: 15px;
            background: rgba(255, 77, 109, 0.1); border-radius: 15px;
            width: 90%; min-height: 1.5em; opacity: 0;
            border: 1px dashed rgba(255,179,193,0.3);
        }

        /* القلوب */
        .heart {
            position: fixed; color: var(--primary); z-index: 9999;
            pointer-events: none; top: 100vh;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
        .star { position: fixed; background: white; border-radius: 50%; z-index: -1; }
    </style>
</head>
<body>

    <div id="login">
        <h2 style="font-family:'Amiri'; color:var(--primary)">its our engagement date❤️</h2>
        <input type="password" id="password" inputmode="numeric">
        <button onclick="checkPassword()" style="padding:12px 40px; background:var(--primary); border:none; border-radius:25px; color:white; font-weight:bold; cursor:pointer">دخول</button>
    </div>

    <div id="content">
        <div class="section">
            <div class="img-container"><img src="photo1.jpg"></div>
            <div class="caption" data-text="  محسساني دايماً بأمان وراحة من أول لحظة❤️"></div>
        </div>

        <div class="section">
            <div class="img-container"><img src="photo2.jpg"></div>
            <div class="caption" data-text="❤️عرفتيني معنى الحب والحنية"></div>
        </div>

        <div class="section">
            <div class="img-container side-images">
                <div class="img-wrapper"><img src="photo4.jpg"></div>
                <div class="img-wrapper"><img src="photo4b.jpg"></div>
            </div>
            <div class="caption" id="engagementCaption"></div>
        </div>

        <div class="section">
            <div class="img-container triple-grid">
                <img src="photo5.jpg">
                <img src="photo6.jpg">
                <img src="photo7.jpg">
            </div>
            <div class="caption" data-text=" ربنا يخليكي ليا يا روح الروح❤️❤️❤️"></div>
        </div>

        <div class="section">
            <div class="img-container side-images">
                <div class="img-wrapper"><img src="photo8.jpg"></div>
                <div class="img-wrapper"><img src="photo9.jpg"></div>
            </div>
            <div class="caption" id="last-caption" data-text=" دايماً سوا في كل خطوة جاية.. بحبك للأبد❤️"></div>
        </div>
    </div>

    <audio id="music" loop><source src="song.mp3" type="audio/mp3"></audio>

    <script>
        // نجوم الخلفية
        for(let i=0; i<60; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.width = star.style.height = Math.random() * 2 + "px";
            star.style.top = Math.random() * 100 + "vh";
            star.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(star);
        }

        function checkPassword() {
            if(document.getElementById("password").value === "13924") {
                document.getElementById("login").style.display = "none";
                document.getElementById("content").style.display = "block";
                document.getElementById("music").play();
                updateEngagementDays();
                initObserver();
            } else { alert("كلمة السر غلط 😢"); }
        }

        function updateEngagementDays() {
            const diff = Math.floor((new Date() - new Date("2024-09-13"))/(1000*60*60*24));
            document.getElementById("engagementCaption").dataset.text = `❤️ كانت أقل حاجة أوفيكي بيها حقك ياست البنات❤️ - بقالنا❤️ ${diff} يوم سوا `;
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        const cap = entry.target.querySelector('.caption');
                        if (cap && cap.innerHTML === '') {
                            cap.style.opacity = 1;
                            typeText(cap, cap.dataset.text);
                        }
                    }
                });
            }, { threshold: 0.5 });
            document.querySelectorAll('.section').forEach(s => observer.observe(s));
        }

        function typeText(element, text) {
            let i = 0;
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, 50);
                } else {
                    // القلوب لا تظهر إلا عند انتهاء آخر جملة في الصفحة (id="last-caption")
                    if (element.id === "last-caption") {
                        setTimeout(launchHearts, 500); 
                    }
                }
            }
            typing();
        }

        function launchHearts() {
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerHTML = "❤";
                    heart.style.left = Math.random() * 100 + "vw";
                    heart.style.fontSize = (Math.random() * 15 + 20) + "px";
                    heart.style.animation = `floatUp ${Math.random() * 3 + 4}s linear forwards`;
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
